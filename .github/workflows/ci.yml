name: CI/CD - Build & Push to Docker Hub

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: PR에서도 빌드 검증 ──────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Backend with Gradle
        run: chmod +x gradlew && ./gradlew clean build -x test

  # ── Job 2: main 브랜치 push 시에만 Docker Hub 배포 ──────────
  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Backend JARs
        run: chmod +x gradlew && ./gradlew clean build -x test

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lp-eureka:latest   ./eureka/
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lp-gateway:latest  ./gateway/
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lp-user:latest     ./user-service/
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lp-product:latest  ./product-service/
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/lp-order:latest    ./order-service/

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lp-eureka:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lp-gateway:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lp-user:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lp-product:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/lp-order:latest

  # ── Job 3: EC2 배포 ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}      # EC2 퍼블릭 IP
          username: ${{ secrets.SERVER_USER }}  # ec2-user
          key: ${{ secrets.SERVER_SSH_KEY }}    # .pem 파일 내용
          script: |
            cd /app/lp-mall
            git pull origin main
            DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f docker-compose.prod.yml pull
            DOCKERHUB_USER=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Waiting for kafka-connect..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8086/connectors > /dev/null 2>&1; then
                echo "kafka-connect is ready"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 5
            done

            if ! curl -sf http://localhost:8086/connectors/lp-mall-outbox-connector > /dev/null 2>&1; then
              curl -X POST http://localhost:8086/connectors \
                -H "Content-Type: application/json" \
                -d @/app/lp-mall/register-connector.json
              echo "Connector registered"
            else
              echo "Connector already exists, skipping"
            fi
